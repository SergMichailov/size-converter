<!DOCTYPE html>
<html lang="ru" data-page="accessories">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Калькулятор размеров аксессуаров: джинсы W/L, бюстгальтеры, перчатки и шапки." />
    <title>SizeFinder — Аксессуары</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a class="brand" id="brand" href="index.html">SizeFinder</a>
            <nav class="nav-links" id="navLinks">
                <a id="navHome" href="index.html">Главная</a>
                <a id="navClothing" href="clothing.html">Одежда</a>
                <a id="navAccessories" href="accessories.html" class="active">Аксессуары</a>
            </nav>
            <div class="header-actions">
                <label class="language-switcher">
                    <span id="langLabel">Язык</span>
                    <select id="languageSelect">
                        <option value="ru">RU</option>
                        <option value="en">EN</option>
                        <option value="fr">FR</option>
                        <option value="nl">NL</option>
                    </select>
                </label>
                <button class="menu-toggle" id="menuToggle" aria-label="Меню">☰</button>
            </div>
        </div>
    </header>

    <main class="page-shell">
        <section class="hero-banner">
            <div class="hero-copy">
                <span id="heroEyebrow" class="eyebrow">Страница аксессуаров</span>
                <h1 id="heroTitle">Калькулятор аксессуаров</h1>
                <p id="heroDescription">Размеры джинсов, бюстгальтеров, перчаток и шапок в одной удобной форме.</p>
            </div>
            <div class="hero-visual">
                <div class="flag-strip">
                    <span class="country-icon">👖</span>
                    <span class="country-icon">🎀</span>
                    <span class="country-icon">🧤</span>
                    <span class="country-icon">🎩</span>
                </div>
            </div>
        </section>

        <section class="panel section-card">
            <div class="section-header">
                <h2>Джинсы W/L</h2>
            </div>
            <div class="calc-grid">
                <label>
                    <span>W</span>
                    <input id="jeansW" type="text" placeholder="Например 32" />
                </label>
                <label>
                    <span>L</span>
                    <input id="jeansL" type="text" placeholder="Например 34" />
                </label>
                <button id="jeansBtn" class="btn btn-primary btn-full">Рассчитать</button>
            </div>
            <div id="jeansResult" class="result-block hidden">
                <h3>Результат</h3>
                <div id="jeansResultList" class="result-list"></div>
            </div>
        </section>

        <section class="panel section-card">
            <div class="section-header">
                <h2>Бюстгальтеры</h2>
            </div>
            <div class="calc-grid">
                <label>
                    <span>EU</span>
                    <input id="braEU" type="text" placeholder="70-90" />
                </label>
                <label>
                    <span>UK</span>
                    <input id="braUK" type="text" placeholder="32-40" />
                </label>
                <label>
                    <span>US</span>
                    <input id="braUS" type="text" placeholder="32-40" />
                </label>
                <button id="braBtn" class="btn btn-primary btn-full">Перевести</button>
            </div>
            <div id="braResult" class="result-block hidden">
                <h3>Результат</h3>
                <div id="braResultList" class="result-list"></div>
            </div>
        </section>

        <section class="panel section-card">
            <div class="section-header">
                <h2>Перчатки</h2>
            </div>
            <div class="calc-grid">
                <label>
                    <span>Обхват ладони</span>
                    <input id="gloveSize" type="text" placeholder="Например 18 см" />
                </label>
                <button id="gloveBtn" class="btn btn-primary btn-full">Определить размер</button>
            </div>
            <div id="gloveResult" class="result-block hidden">
                <h3>Результат</h3>
                <div id="gloveResultList" class="result-list"></div>
            </div>
        </section>

        <section class="panel section-card">
            <div class="section-header">
                <h2>Шапки</h2>
            </div>
            <div class="calc-grid">
                <label>
                    <span>Обхват головы</span>
                    <input id="hatSize" type="text" placeholder="Например 57 см" />
                </label>
                <button id="hatBtn" class="btn btn-primary btn-full">Перевести</button>
            </div>
            <div id="hatResult" class="result-block hidden">
                <h3>Результат</h3>
                <div id="hatResultList" class="result-list"></div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
